# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: 'daily' # Check for updates daily
      time: '10:00' # Check for updates at 10:00 AM
      timezone: 'America/cuiaba' # Use the specified time zone for the update checks  
    Optionally, you can specify additional configuration options here, such as:
    - open-pull-requests-limit: 5 # Limit the number of open pull requests created by Dependabot
    - automerged_updates: true # Automatically merge updates that pass tests and meet the specified criteria
    - versioning-strategy: increase-if-necessary # Specify how version updates should be handled (e.g., increase-if-necessary, widen, lockfile-only)
